services:
  # ============================================================================
  # LOCAL MongoDB (OPTIONAL - Skip this if using MongoDB Atlas)
  # ============================================================================
  # Only needed if you don't have a MongoDB Atlas cluster.
  # To activate: docker compose --profile local --profile express up -d
  # When using Atlas: remove this service and set MONGO_URI in .env
  mongo:
    image: mongo:7
    container_name: worklenz-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-worklenz}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${DB_NAME:-worklenz_db}
    volumes:
      - mongo_data:/data/db
    networks:
      - worklenz-backend
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username ${DB_USER:-worklenz} --password ${DB_PASSWORD} --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    profiles:
      - local

  # ============================================================================
  # Redis Cache (Express mode)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: worklenz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-worklenz_redis_pass}
    volumes:
      - redis_data:/data
    networks:
      - worklenz-backend
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a ${REDIS_PASSWORD:-worklenz_redis_pass} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    profiles:
      - express

  # ============================================================================
  # MinIO Object Storage (Express mode - S3-compatible local storage)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: worklenz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BROWSER: ${MINIO_BROWSER:-on}
    volumes:
      - minio_data:/data
    networks:
      - worklenz-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    profiles:
      - express

  # MinIO Client - Create initial bucket
  minio-init:
    image: minio/mc:latest
    container_name: worklenz-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BUCKET: ${AWS_BUCKET:-worklenz-bucket}
    networks:
      - worklenz-backend
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 5;
      /usr/bin/mc alias set worklenz http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb worklenz/$${MINIO_BUCKET} --ignore-existing;
      /usr/bin/mc anonymous set download worklenz/$${MINIO_BUCKET};
      echo 'MinIO bucket created and configured successfully';
      exit 0;
      "
    profiles:
      - express

  # ============================================================================
  # Backend API (Node.js / Express / MongoDB)
  # ============================================================================
  backend:
    image: chamikajaycey/worklenz-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worklenz-backend
    restart: unless-stopped
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      SESSION_NAME: ${SESSION_NAME:-worklenz.sid}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TZ: ${TZ:-UTC}

      # Database — MongoDB ONLY (NO PostgreSQL)
      DB_TYPE: mongodb
      MONGO_URI: ${MONGO_URI:?MONGO_URI is required - add your MongoDB Atlas URI to .env}

      # Internal backend URL (used for file download URL generation)
      BACKEND_URL: ${VITE_API_URL:-http://localhost}

      # CORS
      SERVER_CORS: ${SERVER_CORS:-*}
      SOCKET_IO_CORS: ${SOCKET_IO_CORS}
      FRONTEND_URL: ${FRONTEND_URL}

      # Storage (Files stored in MongoDB - the only supported mode)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-db}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-worklenz-bucket}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_URL: ${S3_URL:-http://minio:9000}

      # Azure Blob Storage (Advanced mode - optional)
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
      AZURE_STORAGE_URL: ${AZURE_STORAGE_URL:-}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-worklenz_redis_pass}
      REDIS_DB: ${REDIS_DB:-0}

      # Email / SMTP
      ENABLE_EMAIL_CRONJOBS: ${ENABLE_EMAIL_CRONJOBS:-false}
      CONTACT_US_EMAIL: ${CONTACT_US_EMAIL:-}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      MAIL_FROM: ${MAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}

      # Google OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}

      # Google reCAPTCHA (optional)
      GOOGLE_CAPTCHA_SECRET_KEY: ${GOOGLE_CAPTCHA_SECRET_KEY:-}
      GOOGLE_CAPTCHA_PASS_SCORE: ${GOOGLE_CAPTCHA_PASS_SCORE:-0.8}

    volumes:
      - backend_logs:/app/logs
    networks:
      - worklenz-backend
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # Frontend (React / Vite)
  # ============================================================================
  frontend:
    image: chamikajaycey/worklenz-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worklenz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Worklenz}
      VITE_APP_ENV: production
      VITE_ENABLE_RECAPTCHA: ${VITE_ENABLE_RECAPTCHA:-false}
      VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
      VITE_ENABLE_GOOGLE_LOGIN: ${VITE_ENABLE_GOOGLE_LOGIN:-false}
      VITE_ENABLE_SURVEY_MODAL: ${VITE_ENABLE_SURVEY_MODAL:-false}
    networks:
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: worklenz-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ============================================================================
  # Certbot (Let's Encrypt SSL - only with --profile ssl)
  # ============================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: worklenz-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

networks:
  worklenz-backend:
    driver: bridge
    internal: true
  worklenz-frontend:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
